以直接握住它。', '瓷器表面的装饰不应该破坏器型的完整性。' ] }, { id: 3, name: '比亚兹莱', work: '《莎乐美》插画"孔雀裙"', avatar: IMAGES.avatar_3, artwork: IMAGES.artwork_3, introQuotes: [ '黑色与白色足以表达一切欲望，彩色反而显得多余且粗俗。', '为什么要避讳那些细长的脖子和怪诞的侏儒？那才是梦境的样子。', '（对王尔德）我只是画了你想写的，只不过我更露骨一点。' ] }, { id: 4, name: '阿奇博尔德·诺克斯', work: 'Liberty"Cymric"银器系列', avatar: IMAGES.avatar_4, artwork: IMAGES.artwork_4, introQuotes: [ '这些三曲腿图和螺旋纹不是死的，它们像海水一样在流动。', '银器的光泽应该像月光洒在海面上，而不是那种闪闪发亮的炫耀。', '设计是体力活？不，它是冥想，是把古老的灵魂编入金属里。' ] }, { id: 5, name: '穆夏', work: '《吉斯蒙达》戏剧海报', avatar: IMAGES.avatar_5, artwork: IMAGES.artwork_5, introQuotes: [ '艺术不仅仅是为沙龙里的富人服务的，它应该是文明的低声倾诉。', '并不是女神才值得被画进海报，街头的每一个波西米亚女孩都有她神性的瞬间。', '我的一生都在寻找那种像发丝一样柔软又充满生命力的线条。' ] }, { id: 6, name: '罗特列克', work: '《红磨坊的拉·古吕》海报', avatar: IMAGES.avatar_6, artwork: IMAGES.artwork_6, introQuotes: [ '我画的是活生生的人，不是她们画像上的蜡像。', '沙龙里的那些"大作"太无聊了，看看拉古吕踢腿的那一刻吧。', '灯光下的绿色脸和紫红色的影子，为什么不能画出来？我就这么看着的。' ] }, { id: 7, name: '克里姆特', work: '《吻》', avatar: IMAGES.avatar_7, artwork: IMAGES.artwork_7, introQuotes: [ '艺术就是自由，是摆脱所有束缚与限制的科学。', '我不是在画女人，我是在画从金色光芒中浮现的宇宙能量。', '性、恐惧、死亡，这些才是真实的。风景画？那是为了放松。' ] }];const evaluations = { 0: { 1: ['一座玻璃温室？你管这叫建筑？上帝的石头被铁和玻璃取代了，这是亵渎。', '工业的产物，没有灵魂。你可以在里面种香蕉，但别告诉我这是艺术。'], 2: ['几何？简洁？你把上帝赋予器物的装饰权利剥夺了，这就是你的"美"？', '一个没有叶子的糖罐，就像一座没有彩窗的教堂——空洞。'], 3: ['黑白？没有色彩？你这是在拒绝上帝创造的光谱。', '你的线条像蛇一样缠绕，这不是艺术，这是诱惑。'], 4: ['螺旋纹？三曲腿图？这些异教徒的符号，你竟敢称它们为设计。', '月光洒在海面上？银器就该像教堂的烛台一样庄重，不是你的浪漫幻想。'], 5: ['把艺术贴在街头的墙上？艺术属于教堂和上帝的殿堂，不是给路人看的广告。', '你的线条确实柔软，但柔软不等于神圣。'], 6: ['你画的那些女人……她们在笑，但笑里没有虔诚。', '红磨坊？那是堕落的场所，你却把它变成了艺术。我无法理解。'], 7: ['金色的光芒？宇宙能量？你不过在用金色遮掩你画中那些不该示人的东西。', '性、恐惧、死亡？你离上帝越来越远了，克里姆特。'] }, 1: { 0: ['普金啊普金，你的哥特式梦想很美，但一个国家不能只靠尖券和彩窗运转。', '你的国会大厦确实壮观，但别忘了是谁组织了博览会让全世界看到了英国的力量。'], 2: ['德雷瑟，你的水壶很好看，但你能让工厂一天生产一千个吗？', '简洁是好事，但别把"简洁"变成"简陋"。'], 3: ['比亚兹莱先生的插画……嗯，确实很有冲击力，但适合挂在客厅吗？', '你的线条很美，但公众的品味还需要引导，你这种风格太前卫了。'], 4: ['诺克斯的银器，在Liberty百货卖得很好，这就是好设计的证明。', '你的凯尔特纹样很有市场，这说明传统和商业可以共存。'], 5: ['穆夏的海报让巴黎街头变得美丽了，这就是艺术为公众服务的典范。', '你证明了海报也可以是高雅艺术，这正是我想看到的。'], 6: ['罗特列克先生，你的海报很生动，但那些夜生活的题材……我担心公众的道德。', '你的才华毋庸置疑，但如果你能为博物馆画点什么呢？'], 7: ['克里姆特的金色画作……非常……独特。我觉得它们可能更适合私人收藏。', '你的装饰性很强，但"装饰"和"艺术"之间的界限，你似乎模糊了。'] }, 2: { 0: ['普金先生，你的哥特复兴很宏伟，但每一条装饰都在增加成本。功能呢？', '尖券确实指向天空，但它指向天空的时候，结构效率如何？'], 1: ['科尔先生，你让机器生产艺术品，方向是对的，但品味这东西不能靠行政命令。', '水晶宫是工程奇迹，但作为设计？它不过是最大的温室。'], 3: ['比亚兹莱，你的线条有装饰性，但装饰应该服务于器型，而不是独立存在。', '你的黑白插画很精致，但它们能被转印到瓷器上吗？这才是关键。'], 4: ['诺克斯，你的银器纹样太复杂了。好的设计应该从材料中自然生长出来。', '三曲腿图和螺旋纹是古老的，但古老不等于正确。'], 5: ['穆夏，你的海报太"满"了。留白也是一种设计元素，你知道吗？', '你的线条确实优美，但它们缠绕得太多，像藤蔓一样失去了方向。'], 6: ['罗特列克，你捕捉到了动态，这很好。但你的构图太随意了，缺乏结构。', '你的色彩很大胆，绿色脸和紫红影子？这不符合色彩理论。'], 7: ['克里姆特，你的金箔用得太多，它掩盖了形本身。', '你的画是装饰的极致，但装饰应该有节制，就像日本的设计那样。'] }, 3: { 0: ['黑暗、高耸、尖利，像一座被祷告声爬满的骸骨。普金先生，你的建筑让我着迷。', '你的哥特式尖塔像刺穿天空的黑色长矛——我承认，这很美，以一种令人窒息的方式。'], 1: ['水晶宫？一座巨大的玻璃棺材。里面装的是工业的尸体还是维多利亚的虚荣？', '科尔先生，你想提高公众品味？那你先解释一下为什么博览会里最畅销的是镀金烛台。'], 2: ['德雷瑟先生，你的几何水壶很"正确"，但正确是艺术最无聊的品质。', '没有叶子的糖罐？你剥夺了它最后的幻想，只留下一具工业的骨架。'], 4: ['诺克斯的螺旋纹……像溺亡者头发在水中的缠绕，美丽而令人不安。', '你的银器有月光的味道，但月光照到的是坟墓还是海面？'], 5: ['穆夏，你的女人太完美了，完美得像蜡像。我更喜欢她们有瑕疵、有危险。', '你的线条像丝带一样顺滑，但丝带可以勒死人，你知道吗？'], 6: ['罗特列克，你画的是真实的肉体，我画的是欲望的幽灵。我们都在黑暗中工作。', '你的红磨坊有真实的汗水和香水味，我的莎乐美只有墨水和罪恶。'], 7: ['克里姆特，你的金色让我嫉妒。但金子下面是什么？和我的黑色下面一样——都是深渊。', '你用金色包裹肉体，我用黑白解剖灵魂。我们是一枚硬币的两面。'] }, 4: { 0: ['普金的哥特式建筑里有古老的韵律，那些尖券像凯尔特石碑上的符文。', '你的彩窗让光线变成了叙述，这一点，我深表敬意。'], 1: ['水晶宫的模块化结构，和我的银器纹样有异曲同工之妙——都是重复中的变化。', '科尔先生，你让工业变得体面了，但体面和美之间还有距离。'], 2: ['德雷瑟，你追求的几何纯粹，我在马恩岛的十字架上见过。', '你的简洁是对的，但你丢失了纹样中那些古老的记忆。'], 3: ['比亚兹莱，你的线条像凯尔特结一样纠缠，但你的结里藏着毒蛇。', '你的黑白世界太锐利了，像一把没有剑鞘的匕首。'], 5: ['穆夏，你的装饰框架太华丽了，像给花朵套上了过多的花环。', '你的线条有拜占庭的味道，但拜占庭的庄严你只学到了表面。'], 6: ['罗特列克，你用几笔就抓住了人的神韵，这种能力我很羡慕。', '你的画有速写般的自由，但自由不等于草率。'], 7: ['克里姆特，你的金色和我的银色本可以对话，但你的金太喧嚣了。', '你的装饰像热带丛林，我的像北方海域。我们生活在不同的气候里。'] }, 5: { 0: ['普金先生的建筑像一首垂直的赞美诗，每个尖券都是一个向天堂攀升的音符。', '你的哥特式理想很崇高，但崇高不应该排斥其他形式的美。'], 1: ['科尔先生，水晶宫让艺术走进了大众，这一点我必须向你致敬。', '你让机器为美服务，这正是新时代的方向。'], 2: ['德雷瑟先生，你的极简主义很有勇气，但世界需要的不只是功能。', '你的几何形态很纯粹，但纯粹到极致就变成了冷漠。'], 3: ['比亚兹莱……你的才华令人惊叹，但你的黑暗让我不安。美应该是光明的。', '你的线条有一种病态的美，像深夜里盛开的曼陀罗。'], 4: ['诺克斯的银器中有一种古老而深沉的韵律，像潮汐一样不可抗拒。', '你的凯尔特纹样让我想起了故乡布拉格的古老符号。'], 6: ['罗特列克，你画出了巴黎最真实的面孔——不是最美的，但是最诚实的。', '你的色彩像打翻了的颜料盘，混乱中自有秩序。'], 7: ['克里姆特，你的金色世界像一场华丽的梦，但梦醒之后呢？', '你的装饰性绘画达到了极致，但极致之后是什么？'] }, 6: { 0: ['普金的国会大厦？太庄严了，太沉重了。我在里面走一圈大概会喘不过气。', '你的哥特式建筑像一件紧身衣，把一切都束缚得太紧了。'], 1: ['水晶宫？那是个大玻璃盒子。在里面办博览会？还不如去蒙马特喝一杯。', '科尔先生，你操心公众品味？让他们自己选吧，庸俗也是一种自由。'], 2: ['德雷瑟的水壶？几何、简洁、没有把手？好吧，至少它不会洒。', '你的设计像医院一样干净，但生活不是无菌室。'], 3: ['比亚兹莱，你这个病鬼，你的画比你的身体还有劲。', '你的线条太精致了，精致得像蜘蛛网——美丽但脆弱。'], 4: ['诺克斯的银器？不错，适合放在有钱人的客厅里。但我的画挂在酒馆墙上更自在。', '你的纹样像迷宫，我在里面转了几圈就晕了。'], 5: ['穆夏，你的海报让巴黎的街灯都变得柔和了。但你的女人太完美了，不真实。', '你的波西米亚女孩是从天上掉下来的，我的姑娘们是从泥里长出来的。'], 7: ['克里姆特，你的金色画……说实话，太华丽了。像把整个维也纳的歌剧院穿在了身上。', '你的女人被金箔包裹着，我的女人被灯光照亮着。我们都爱女人，方式不同。'] }, 7: { 0: ['普金的尖券指向天堂，但我的金色指向的是人体本身。哪个更真实？', '你的哥特式建筑是石头的交响乐，但我的画是色彩的情书。'], 1: ['水晶宫——一座透明的纪念碑。透明是好的，但里面装的是什么？', '科尔先生，你让工业变得美丽了？不，你只是让美丽变得工业了。'], 2: ['德雷瑟，你的几何纯粹让我想到了古埃及。但古埃及人知道如何装饰他们的器物。', '你的极简是一种禁欲，而我是享乐主义者。我们注定无法互相理解。'], 3: ['比亚兹莱，你的黑白世界像一场未完成的梦。给它加上金色吧，它会醒来。', '你的线条有性的暗示，但太含蓄了。我更喜欢直接。'], 4: ['诺克斯的银器在月光下一定很美。但月光是冷的，我的金色是温暖的。', '你的凯尔特纹样像古老的咒语，但我的金色是当下的欲望。'], 5: ['穆夏，你的海报是美的，但这种美太"安全"了。艺术应该让人不安。', '你的线条像河流一样流畅，但河流有时候也会泛滥。'], 6: ['罗特列克，你是最诚实的画家之一。你画的不是理想，是现实。', '你的色彩大胆得让我嫉妒。绿色脸？我也想试试。'] }};const selfQuotes = [ '对自己的作品，我保持沉默。', '评价自己？这就像让镜子评价自己的清晰度。', '我只想说：这是我最好的作品。至于为什么——无可奉告。', '如果我能用一句话总结自己的作品，那我就不需要创作了。', '沉默，是我对自己作品最高的敬意。', '问我怎么看自己的作品？我只知道，画完那一刻，我是诚实的。', '自评？不，那是我留给评论家的工作——虽然他们通常都搞错了。'];let selectedIds = new Set();let currentGalleryIndex = 0;let galleryArtists = [];function renderSelectionPage() { const grid = document.getElementById('artists-grid'); grid.innerHTML = ''; artists.forEach((a, i) => { const card = document.createElement('div'); card.className = 'artist-card'; card.dataset.id = a.id; card.style.animationDelay = (i * 0.08) + 's'; card.classList.add('fade-in'); const quote = a.introQuotes[Math.floor(Math.random() * a.introQuotes.length)]; card.innerHTML = ` <div class="speech-bubble">${quote}</div><div class="avatar-wrapper"><img src="${a.avatar}" alt="${a.name}" onerror="this.style.display='none'"></div><div class="artist-name">${a.name}</div> `; card.addEventListener('click', () => toggleSelect(a.id)); card.addEventListener('mouseenter', () => { const bubble = card.querySelector('.speech-bubble'); const randomQuote = a.introQuotes[Math.floor(Math.random() * a.introQuotes.length)]; bubble.textContent = randomQuote; }); grid.appendChild(card); });}function toggleSelect(id) { if (selectedIds.has(id)) { selectedIds.delete(id); } else { selectedIds.add(id); } updateSelectionUI();}function updateSelectionUI() { const cards = document.querySelectorAll('.artist-card'); cards.forEach(card => { const id = parseInt(card.dataset.id); card.classList.toggle('selected', selectedIds.has(id)); }); const count = selectedIds.size; document.getElementById('selected-count').textContent = `已选择 ${count} 位艺术家`; const btn = document.getElementById('go-on-btn'); if (count > 0) { btn.classList.remove('disabled'); btn.classList.add('active'); } else { btn.classList.add('disabled'); btn.classList.remove('active'); }}function goToGallery() { if (selectedIds.size === 0) return; galleryArtists = artists.filter(a => selectedIds.has(a.id)); currentGalleryIndex = 0; document.getElementById('selection-page').style.display = 'none'; document.getElementById('gallery-page').style.display = 'flex'; renderGalleryBottom(); showArtist(0);}function renderGalleryBottom() { const bar = document.getElementById('selected-artists-bar'); bar.innerHTML = ''; galleryArtists.forEach((a, i) => { const el = document.createElement('div'); el.className = 'bar-artist'; el.dataset.index = i; el.innerHTML = ` <div class="gallery-bubble"></div><div class="bar-avatar"><img src="${a.avatar}" alt="${a.name}" onerror="this.style.display='none'"></div><div class="bar-name">${a.name}</div> `; el.addEventListener('click', () => showArtist(i)); el.addEventListener('mouseenter', () => { const bubble = el.querySelector('.gallery-bubble'); const hoveredArtist = a; const displayedArtist = galleryArtists[currentGalleryIndex]; if (hoveredArtist.id === displayedArtist.id) { const selfQ = selfQuotes[Math.floor(Math.random() * selfQuotes.length)]; bubble.textContent = selfQ; } else { const evals = evaluations[hoveredArtist.id]; if (evals && evals[displayedArtist.id]) { const evalList = evals[displayedArtist.id]; const evalQuote = evalList[Math.floor(Math.random() * evalList.length)]; bubble.textContent = evalQuote; } else { bubble.textContent = `关于${displayedArtist.name}的作品……嗯，我需要再想想。`; } } }); bar.appendChild(el); });}function showArtist(index) { currentGalleryIndex = index; const a = galleryArtists[index]; const frame = document.getElementById('artwork-frame'); frame.classList.remove('artwork-transition'); void frame.offsetWidth; frame.classList.add('artwork-transition'); document.getElementById('artwork-img').src = a.artwork; document.getElementById('artwork-artist-name').textContent = a.name; document.getElementById('artwork-title').textContent = a.work; const barItems = document.querySelectorAll('.bar-artist'); barItems.forEach((item, i) => { item.classList.toggle('active', i === index); });}function prevArtist() { const newIndex = (currentGalleryIndex - 1 + galleryArtists.length) % galleryArtists.length; showArtist(newIndex);}function nextArtist() { const newIndex = (currentGalleryIndex + 1) % galleryArtists.length; showArtist(newIndex);}document.addEventListener('keydown', (e) => { if (document.getElementById('gallery-page').style.display === 'flex') { if (e.key === 'ArrowLeft') prevArtist(); if (e.key === 'ArrowRight') nextArtist(); }});renderSelectionPage();</script></body></html>
